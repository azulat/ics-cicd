<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inicio | Proyecto</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-secondary: #666666;
            --accent: #000000;
            --border: #ececec;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        main {
            max-width: 500px;
            width: 100%;
        }

        .content {
            border-left: 1px solid var(--accent);
            padding-left: 24px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        footer {
            margin-top: 32px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <main>
        <div class="content">
            <h1>Integración y Entrega Continua</h1>
            <p>Para la segunda instancia de evaluación en el marco de la asignatura Ingeniería y Calidad de Software.</p>
        </div>
    </main>
</body>
</html>
