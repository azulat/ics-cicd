<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advertencia: Animación psicodélica y fotosensible extrema.">
    <title>¡HOLA MINOLI! | PSICODELIA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Usamos una fuente súper gruesa e impactante -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            font-family: 'Rubik Mono One', sans-serif;
            /* Animación psicodélica de fondo ultra-rápida y contrastante */
            animation: strobeBg 0.15s steps(1) infinite;
        }

        /* Capas de color superpuestas que rotan de forma caótica */
        .plasma {
            position: absolute;
            width: 150vmax;
            height: 150vmax;
            top: -25%;
            left: -25%;
            background: radial-gradient(circle, #ff0055 0%, #00ff66 40%, #00ffff 70%, #ff00ff 100%);
            mix-blend-mode: difference;
            animation: spinPlasma 1.5s linear infinite;
            z-index: 1;
        }

        .plasma-secondary {
            position: absolute;
            width: 130vmax;
            height: 130vmax;
            top: -15%;
            left: -15%;
            background: conic-gradient(from 180deg, #ffff00, #ff00ff, #00ffff, #ffff00);
            mix-blend-mode: difference;
            animation: spinPlasmaInverse 0.8s linear infinite;
            z-index: 2;
        }

        main {
            position: relative;
            z-index: 10;
            text-align: center;
            user-select: none;
            mix-blend-mode: difference;
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 8rem);
            color: #fff;
            text-shadow: 
                0 0 10px #ff0000, 
                0 0 20px #00ff00, 
                0 0 30px #0000ff;
            letter-spacing: -0.05em;
            line-height: 0.9;
            text-transform: uppercase;
            /* Animación tridimensional y de glitch extrema */
            animation: crazyText 0.4s ease-in-out infinite alternate, shakeText 0.08s steps(2) infinite;
            will-change: transform, filter;
        }

        /* Flash de advertencia estética */
        .warning-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #ff0055;
            color: #00ff66;
            padding: 8px 16px;
            font-family: 'Syncopate', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.2em;
            z-index: 100;
            text-transform: uppercase;
            animation: flashText 0.3s steps(2) infinite;
        }

        /* --- ANIMACIONES EXTREMAS Y FOTOSENSIBLES --- */

        /* Estrobo de fondo */
        @keyframes strobeBg {
            0% { background-color: #ff0000; }
            16% { background-color: #00ff00; }
            33% { background-color: #0000ff; }
            50% { background-color: #ffff00; }
            66% { background-color: #ff00ff; }
            83% { background-color: #00ffff; }
            100% { background-color: #000000; }
        }

        /* Rotaciones ultra-rápidas para el plasma */
        @keyframes spinPlasma {
            0% { transform: rotate(0deg) scale(1); filter: hue-rotate(0deg); }
            50% { transform: rotate(180deg) scale(1.3); filter: hue-rotate(180deg); }
            100% { transform: rotate(360deg) scale(1); filter: hue-rotate(360deg); }
        }

        @keyframes spinPlasmaInverse {
            0% { transform: rotate(360deg) scale(1.2); }
            50% { transform: rotate(180deg) scale(0.8); }
            100% { transform: rotate(0deg) scale(1.2); }
        }

        /* Distorsión 3D loca y cambio de tamaño del texto */
        @keyframes crazyText {
            0% {
                transform: scale(0.85) rotate(-8deg) skewX(-15deg) translateZ(0);
                text-shadow: 4px 4px 0px #ff0055, -4px -4px 0px #00ffff;
            }
            50% {
                transform: scale(1.2) rotate(12deg) skewX(20deg) translateZ(50px);
                text-shadow: -6px 3px 0px #00ff66, 6px -3px 0px #ff00ff;
            }
            100% {
                transform: scale(0.9) rotate(-15deg) skewX(-5deg) translateZ(-50px);
                text-shadow: 3px -5px 0px #ffff00, -3px 5px 0px #0000ff;
            }
        }

        /* Sacudida horizontal / vertical de glitch */
        @keyframes shakeText {
            0% { transform: translate(3px, 3px); }
            25% { transform: translate(-3px, -2px); }
            50% { transform: translate(-1px, 2px); }
            75% { transform: translate(2px, -3px); }
            100% { transform: translate(-2px, -1px); }
        }

        /* Parpadeo del cartel de advertencia */
        @keyframes flashText {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="warning-overlay" id="warn">PHOTOSENSITIVITY WARNING</div>
    <div class="plasma" id="p1"></div>
    <div class="plasma-secondary" id="p2"></div>
    <main id="app-container">
        <h1 id="main-title">¡Hola, Minoli!</h1>
    </main>
</body>
</html>
