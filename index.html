<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Una hermosa página de bienvenida creada con diseño moderno y minimalista para el proyecto de Integración Continua.">
    <title>Hola Mundo | Tomás Azula</title>
    <!-- Importamos fuentes premium de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #09090b;
            --text-secondary: #a1a1aa;
            --accent-start: #a78bfa;
            --accent-end: #f472b6;
            --glow-color: rgba(167, 139, 250, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Orbe de luz de fondo para dar profundidad */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--glow-color) 0%, rgba(9, 9, 11, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        main {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, var(--accent-start) 0%, var(--accent-end) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            animation: fadeInScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform, opacity;
        }

        p {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            will-change: transform, opacity;
        }

        /* Decoración de línea sutil */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            margin-bottom: 1.5rem;
            border-radius: 2px;
            opacity: 0;
            transform: scaleX(0);
            animation: expandWidth 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
            will-change: transform, opacity;
        }

        /* Animaciones */
        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes expandWidth {
            to {
                opacity: 0.8;
                transform: scaleX(1);
            }
        }

        @keyframes pulseGlow {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow" id="glow-orb"></div>
    <main id="app-container">
        <div class="container">
            <h1 id="main-title">¡Hola, Mundo!</h1>
            <div class="divider" id="title-divider"></div>
            <p id="author-name">de Tomás Azula</p>
        </div>
    </main>
</body>
</html>
